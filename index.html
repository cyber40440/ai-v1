<!DOCTYPE html>
<html>
<head>
    <title>My Cyber AI</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-card { border: 2px solid #0f0; padding: 20px; width: 350px; box-shadow: 0 0 15px #0f0; border-radius: 10px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; width: 70%; padding: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; }
        #display { margin-top: 20px; min-height: 100px; border-top: 1px solid #0f0; padding-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="chat-card">
    <h2>CYBER-BOT v1.0</h2>
    <input type="text" id="user-msg" placeholder="Ask me anything...">
    <button id="btn">SEND</button>
    <div id="display">Awaiting command...</div>
</div>

<script>
    // THE BRAIN
    const brain = {
        "hello": ["System online. Greetings.", "Hello user.", "Connection established."],
        "joke": ["Why did the Wi-Fi marry the router? Because they had a great connection!", "0 is afraid of 1 because 1 2 3."],
        "pizza": ["Pizza is compatible with my hardware.", "Downloading pepperoni... Just kidding."],
        "name": ["I am Cyber-Bot.", "You built me on a Chromebook!"]
    };

    // THE MATH ENGINE
    function solveMath(input) {
        const match = input.match(/(\d+)\s*([\+\-\*\/])\s*(\d+)/);
        if (match) {
            const n1 = parseFloat(match[1]), op = match[2], n2 = parseFloat(match[3]);
            let res;
            if (op === "+") res = n1 + n2;
            if (op === "-") res = n1 - n2;
            if (op === "*") res = n1 * n2;
            if (op === "/") res = n2 !== 0 ? n1 / n2 : "Error";
            return "RESULT: " + res;
        }
        return null;
    }

    // THE LOGIC
    document.getElementById("btn").onclick = function() {
        const inputField = document.getElementById("user-msg");
        const display = document.getElementById("display");
        const val = inputField.value.toLowerCase();
        
        let response = solveMath(val);

        if (!response) {
            for (let t in brain) {
                if (val.includes(t)) {
                    response = brain[t][Math.floor(Math.random() * brain[t].length)];
                }
            }
        }

        if (!response) response = "Command not recognized. Try 'joke' or math.";
        
        display.innerHTML = "USER: " + inputField.value + "<br>AI: " + response;
        inputField.value = "";
    };
</script>
</body>
</html>
