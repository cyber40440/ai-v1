<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Bot: Massive Brain</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #chat-container { border: 2px solid #00ff41; width: 90%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px #00ff41; background: #000; position: relative; }
        #display { height: 300px; overflow-y: auto; border-bottom: 1px solid #00ff41; margin-bottom: 15px; padding: 10px; font-size: 14px; }
        .input-area { display: flex; gap: 10px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; flex-grow: 1; padding: 12px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        button:hover { background: #fff; }
        .user-line { color: #fff; margin-bottom: 5px; }
        .ai-line { color: #00ff41; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="chat-container">
    <h2 style="text-align: center; margin-top: 0;">CYBER-BRAIN v2.0</h2>
    <div id="display">SYSTEM INITIALIZED... Type 'help' to see commands.</div>
    <div class="input-area">
        <input type="text" id="user-msg" placeholder="Enter command..." autocomplete="off">
        <button id="btn">SEND</button>
    </div>
</div>

<script>
    // --- THE BIG BRAIN DATA ---
    const brain = {
        "hello": ["System online. Greetings.", "Hello! Logic circuits ready.", "Connection established."],
        "joke": ["Why did the math book look sad? It had too many problems.", "What's an AI's favorite snack? Computer chips!"],
        "pizza": ["Pizza is 100% compatible with my hardware.", "Data suggests pepperoni is the best topping."],
        "roblox": ["Roblox is great! Do you like building or playing?", "Roblox uses Lua code!"],
        "space": ["Space is infinite. Mars is the Red Planet.", "The moon is 238,855 miles away."],
        "coding": ["JavaScript is the language of the web!", "Coding is just logic and magic."],
        "help": ["Try: 'joke', 'pizza', 'space', 'coding', or math like '10 + 10'."]
    };

    // --- THE BRAIN LOGIC ---
    const btn = document.getElementById("btn");
    const inputField = document.getElementById("user-msg");
    const display = document.getElementById("display");

    function process() {
        const rawInput = inputField.value;
        if (!rawInput) return;
        const val = rawInput.toLowerCase().trim();
        
        let response = "";

        // 1. Try Math
        const mathMatch = val.match(/(\d+)\s*([\+\-\*\/])\s*(\d+)/);
        if (mathMatch) {
            const n1 = parseFloat(mathMatch[1]), op = mathMatch[2], n2 = parseFloat(mathMatch[3]);
            let res = (op==="+")?n1+n2 : (op==="-")?n1-n2 : (op==="*")?n1*n2 : (n2!==0?n1/n2:"Error");
            response = "MATH RESULT: " + res;
        }

        // 2. Try Word Brain
        if (!response) {
            for (let t in brain) {
                if (val.includes(t)) {
                    response = "AI: " + brain[t][Math.floor(Math.random() * brain[t].length)];
                    break;
                }
            }
        }

        if (!response) response = "AI: Command not recognized. Try 'help'.";

        // Update Screen
        display.innerHTML += `<div class="user-line">YOU: ${rawInput}</div>`;
        display.innerHTML += `<div class="ai-line">${response}</div>`;
        display.scrollTop = display.scrollHeight;
        inputField.value = "";
    }

    btn.onclick = process;
    inputField.onkeypress = (e) => { if(e.key === "Enter") process(); };
</script>

</body>
</html>
